<div class="fondo-inicio">

  <div class="state-loading" *ngIf="cargando">
    <div class="loader"></div>
    <p>Cargando</p>
  </div>

  <ng-container *ngIf="!cargando">
    <h1 class="dashboard-title">Portal de Aplcaciones</h1>
    <div class="dashboard-grid">
      <div class="dash-card" *ngFor="let item of cards" (click)="navigate(item.url)">
        <div class="dash-card-image">
          <img [src]="item.img" [alt]="item.label" />
        </div>
        <div class="dash-card-body">
          <p class="dash-label">{{ item.label }}</p>
          <p class="dash-sub">{{ item.sub }}</p>
        </div>
        <div class="dash-card-footer">
          <span class="dash-copy" (click)="copyUrl($event, item.url)" [title]="'Copiar enlace'">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </span>
          <span class="dash-arrow">→</span>
        </div>
      </div>
    </div>
  </ng-container>

</div>
